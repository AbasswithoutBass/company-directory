services:
  - type: web
    name: company-directory
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    # 免费版会在 15 分钟无请求后休眠,首次唤醒约 30s
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true  # Render 自动生成随机强密钥
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SEED_ON_BOOT
        value: "true"  # 首次部署时自动写入示例员工(后续重启会跳过,因为已存在)
    # 注:Render Free tier 不支持持久磁盘,数据存项目目录。
    #    重新部署/重启会清空,SEED_ON_BOOT 会自动重新写入示例数据。
    #    如需真持久化:升级到 Starter($7/月)或换 Turso 免费 SQLite 托管。
